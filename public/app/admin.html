<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ-панель — Развёртка & Раскрой</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <script>
    (function () {
      try {
        var t = localStorage.getItem('rzv:theme');
        if (!t) t = 'dark';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
  <style>
    .admin-shell { min-height: 100vh; background: var(--bg); color: var(--text); padding: 20px; }
    .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding: 16px 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
    .admin-title { font-size: 20px; font-weight: 800; }
    .admin-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .admin-tab { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); font-weight: 600; cursor: pointer; font-size: 13px; }
    .admin-tab.is-active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .admin-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .admin-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
    .stat-card__value { font-size: 28px; font-weight: 800; color: var(--accent); font-family: var(--font-mono, monospace); }
    .stat-card__label { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: .05em; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .admin-table th { text-align: left; padding: 8px 12px; border-bottom: 2px solid var(--border); font-weight: 700; color: var(--text-muted); font-size: 11px; text-transform: uppercase; }
    .admin-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .admin-table tr:hover td { background: var(--surface-2); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 700; }
    .badge--ok { background: color-mix(in srgb, #22c55e 20%, transparent); color: #22c55e; }
    .badge--none { background: var(--surface-2); color: var(--text-muted); }
    .badge--admin { background: color-mix(in srgb, var(--accent) 20%, transparent); color: var(--accent); }
    .btn-sm { padding: 4px 10px; font-size: 11px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface-2); cursor: pointer; }
    .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
    .admin-login { max-width: 400px; margin: 80px auto; }
    .admin-login input { width: 100%; margin-bottom: 12px; }
    .admin-empty { text-align: center; padding: 40px; color: var(--text-faint); }
    .pagination { display: flex; gap: 8px; justify-content: center; margin-top: 16px; }
    .pagination button { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; }
    .pagination button:disabled { opacity: .4; cursor: default; }
    .pagination button.is-active { background: var(--accent); color: #fff; border-color: var(--accent); }
  </style>
</head>
<body>
  <div class="admin-shell">
    <!-- Login -->
    <div class="admin-login" id="admin-login">
      <div class="admin-card">
        <h2 style="text-align:center;margin-bottom:16px;">Админ-панель</h2>
        <input class="input" id="admin-email" type="email" placeholder="Email" />
        <input class="input" id="admin-password" type="password" placeholder="Пароль" />
        <button class="btn btn--primary btn--block" id="admin-login-btn">Войти</button>
        <p id="admin-login-error" style="color:var(--danger);font-size:12px;margin-top:8px;text-align:center;"></p>
      </div>
    </div>

    <!-- Dashboard -->
    <div id="admin-dashboard" style="display:none;">
      <div class="admin-header">
        <span class="admin-title">Админ-панель — Развёртка & Раскрой</span>
        <button class="btn btn--ghost" id="admin-logout">Выйти</button>
      </div>

      <div class="admin-tabs">
        <button class="admin-tab is-active" data-admin-tab="stats">Статистика</button>
        <button class="admin-tab" data-admin-tab="users">Пользователи</button>
        <button class="admin-tab" data-admin-tab="payments">Платежи</button>
      </div>

      <div id="admin-content"></div>
    </div>
  </div>

  <script type="module">
    let currentPage = { users: 1, payments: 1 };

    // Login
    document.getElementById('admin-login-btn')?.addEventListener('click', async () => {
      const email = document.getElementById('admin-email').value.trim();
      const password = document.getElementById('admin-password').value;
      const errEl = document.getElementById('admin-login-error');
      errEl.textContent = '';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.error || 'Ошибка входа';
          return;
        }
        if (data.user?.role !== 'admin') {
          errEl.textContent = 'Доступ только для администраторов';
          return;
        }
        showDashboard();
      } catch (e) {
        errEl.textContent = 'Сеть недоступна';
      }
    });

    // Logout
    document.getElementById('admin-logout')?.addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' });
      location.reload();
    });

    // Tabs
    document.querySelectorAll('[data-admin-tab]').forEach((tab) => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('[data-admin-tab]').forEach((t) => t.classList.remove('is-active'));
        tab.classList.add('is-active');
        loadTab(tab.dataset.adminTab);
      });
    });

    async function showDashboard() {
      document.getElementById('admin-login').style.display = 'none';
      document.getElementById('admin-dashboard').style.display = '';
      loadTab('stats');
    }

    async function loadTab(tab) {
      const content = document.getElementById('admin-content');
      content.innerHTML = '<div class="admin-empty">Загрузка…</div>';

      if (tab === 'stats') {
        const res = await fetch('/api/admin/stats', { credentials: 'same-origin' });
        const data = await res.json();
        if (!res.ok) { content.innerHTML = '<div class="admin-empty">Ошибка: ' + (data.error || '') + '</div>'; return; }
        content.innerHTML = `
          <div class="admin-stats">
            <div class="stat-card"><div class="stat-card__value">${data.users.total}</div><div class="stat-card__label">Пользователей</div></div>
            <div class="stat-card"><div class="stat-card__value">${data.users.verified}</div><div class="stat-card__label">Подтверждённых</div></div>
            <div class="stat-card"><div class="stat-card__value">${data.users.premium}</div><div class="stat-card__label">С премиумом</div></div>
            <div class="stat-card"><div class="stat-card__value">${data.payments.paid}</div><div class="stat-card__label">Оплаченных</div></div>
            <div class="stat-card"><div class="stat-card__value">${data.payments.revenue} ₽</div><div class="stat-card__label">Выручка</div></div>
            <div class="stat-card"><div class="stat-card__value">${data.projects}</div><div class="stat-card__label">Проектов</div></div>
          </div>
        `;
      } else if (tab === 'users') {
        await loadUsers(1);
      } else if (tab === 'payments') {
        await loadPayments(1);
      }
    }

    async function loadUsers(page) {
      currentPage.users = page;
      const content = document.getElementById('admin-content');
      const res = await fetch(`/api/admin/users?page=${page}&limit=20`, { credentials: 'same-origin' });
      const data = await res.json();
      if (!res.ok) { content.innerHTML = '<div class="admin-empty">Ошибка: ' + (data.error || '') + '</div>'; return; }

      const rows = data.users.map((u) => `
        <tr>
          <td>${u.email}</td>
          <td>${u.role === 'admin' ? '<span class="badge badge--admin">ADMIN</span>' : '—'}</td>
          <td>${u.emailVerified ? '✓' : '—'}</td>
          <td>${u.premium ? '<span class="badge badge--ok">' + u.plan + '</span>' : '<span class="badge badge--none">free</span>'}</td>
          <td>${u.premiumUntil ? new Date(u.premiumUntil).toLocaleDateString('ru-RU') : '—'}</td>
          <td>${new Date(u.createdAt).toLocaleDateString('ru-RU')}</td>
          <td>
            <button class="btn-sm" onclick="setPremium('${u.id}','month')">M</button>
            <button class="btn-sm" onclick="setPremium('${u.id}','year')">Y</button>
            <button class="btn-sm" onclick="setPremium('${u.id}','lifetime')">∞</button>
            <button class="btn-sm" onclick="setPremium('${u.id}','none')">✕</button>
          </td>
        </tr>
      `).join('');

      content.innerHTML = `
        <div class="admin-card">
          <table class="admin-table">
            <thead><tr><th>Email</th><th>Роль</th><th>Подтв.</th><th>Тариф</th><th>До</th><th>Регистр.</th><th>Действия</th></tr></thead>
            <tbody>${rows || '<tr><td colspan="7" style="text-align:center;color:var(--text-faint);">Нет пользователей</td></tr>'}</tbody>
          </table>
          ${renderPagination(data.pages, currentPage.users, 'loadUsers')}
        </div>
      `;
    }

    async function loadPayments(page) {
      currentPage.payments = page;
      const content = document.getElementById('admin-content');
      const res = await fetch(`/api/admin/payments?page=${page}&limit=20`, { credentials: 'same-origin' });
      const data = await res.json();
      if (!res.ok) { content.innerHTML = '<div class="admin-empty">Ошибка: ' + (data.error || '') + '</div>'; return; }

      const rows = data.payments.map((p) => `
        <tr>
          <td>${p.user?.email || '—'}</td>
          <td>${p.plan}</td>
          <td>${p.amount} ₽</td>
          <td>${p.status === 'paid' ? '<span class="badge badge--ok">оплачен</span>' : '<span class="badge badge--none">' + p.status + '</span>'}</td>
          <td>${p.uniqueCode || '—'}</td>
          <td>${new Date(p.createdAt).toLocaleDateString('ru-RU')}</td>
        </tr>
      `).join('');

      content.innerHTML = `
        <div class="admin-card">
          <table class="admin-table">
            <thead><tr><th>Email</th><th>Тариф</th><th>Сумма</th><th>Статус</th><th>Код</th><th>Дата</th></tr></thead>
            <tbody>${rows || '<tr><td colspan="6" style="text-align:center;color:var(--text-faint);">Нет платежей</td></tr>'}</tbody>
          </table>
          ${renderPagination(data.pages, currentPage.payments, 'loadPayments')}
        </div>
      `;
    }

    function renderPagination(pages, current, fn) {
      if (pages <= 1) return '';
      let html = '<div class="pagination">';
      for (let i = 1; i <= pages; i++) {
        html += `<button class="${i === current ? 'is-active' : ''}" onclick="${fn}(${i})">${i}</button>`;
      }
      html += '</div>';
      return html;
    }

    window.setPremium = async function(userId, plan) {
      if (!confirm(`Установить тариф "${plan}" для пользователя?`)) return;
      const res = await fetch('/api/admin/set-premium', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ userId, plan }),
      });
      if (res.ok) {
        loadUsers(currentPage.users);
      } else {
        alert('Ошибка');
      }
    };

    window.loadUsers = loadUsers;
    window.loadPayments = loadPayments;

    // Auto-check if already logged in
    fetch('/api/auth/me', { credentials: 'same-origin' })
      .then((r) => r.json())
      .then((data) => {
        if (data.user?.role === 'admin') showDashboard();
      })
      .catch(() => {});
  </script>
</body>
</html>
